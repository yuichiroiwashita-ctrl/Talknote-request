<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Talknote Request Management</title>
  <style>
    body { font-family: sans-serif; max-width: 980px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    label { display:block; margin:8px 0 4px; }
    input, textarea, select, button { width:100%; padding:8px; }
    pre { background:#111; color:#ddd; padding:12px; overflow:auto; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap: 10px; }
  </style>
</head>
<body>
  <h1>Talknote Request Management (MVP)</h1>
  <p>GitHub Pages 配置向けの最小UIです。Apps Script Web App URLを指定して利用します。</p>

  <div class="card">
    <label>Apps Script API URL</label>
    <input id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    <button id="loadGroups">Talknoteノート一覧を取得</button>
  </div>

  <div class="card">
    <h2>リクエスト作成</h2>
    <div class="row">
      <div><label>依頼者 user_id</label><input id="requester" /></div>
      <div><label>担当者 user_id</label><input id="assignee" /></div>
    </div>
    <label>タイトル</label><input id="title" />
    <label>内容</label><textarea id="description"></textarea>
    <label>理由</label><textarea id="reason"></textarea>
    <label>期日 (ISO8601)</label><input id="dueAt" placeholder="2026-04-01T18:00:00+09:00" />
    <label>投稿先ノート</label>
    <select id="groupId"></select>
    <button id="createRequest">作成</button>
  </div>

  <div class="card">
    <h2>リクエスト回答</h2>
    <div class="row">
      <div><label>request_id</label><input id="rspRequestId" /></div>
      <div><label>回答者 user_id</label><input id="responder" /></div>
    </div>
    <label>回答種別</label>
    <select id="responseType">
      <option value="yes">Yes</option>
      <option value="no">No</option>
      <option value="conditional_yes">条件付きYes</option>
    </select>
    <label>メッセージ</label><textarea id="responseMessage"></textarea>
    <button id="respondRequest">回答送信</button>
  </div>

  <div class="card">
    <h2>結果</h2>
    <pre id="result">(ここにレスポンスが表示されます)</pre>
  </div>

  <script src="./app.js"></script>
</body>
</html>
